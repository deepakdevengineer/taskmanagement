<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Tasks</h1>
      <p class="page-subtitle">Manage your workflow efficiently</p>
    </div>
    <button routerLink="/tasks/new" class="btn btn-primary">
      <span class="icon">+</span> Add Task
    </button>
  </div>

  <div class="filters-bar glass-card">
    <div class="search-box">
      <input 
        type="text" 
        class="form-control" 
        placeholder="Search tasks by title..." 
        [ngModel]="searchTerm" 
        (input)="onSearchChange($event)"
      >
    </div>
    <div class="filter-box">
      <select class="form-control" [ngModel]="statusFilter" (change)="onStatusChange($event)">
        <option value="">All Statuses</option>
        <option value="PENDING">Pending</option>
        <option value="IN_PROGRESS">In Progress</option>
        <option value="COMPLETED">Completed</option>
      </select>
    </div>
  </div>

  <div class="loading-state" *ngIf="isLoading">
    <div class="spinner"></div>
    <p>Loading tasks...</p>
  </div>

  <div class="empty-state glass-card" *ngIf="!isLoading && tasks.length === 0">
    <div class="empty-icon"></div>
    <h3>No tasks found</h3>
    <p>Get started by creating a new task.</p>
    <button routerLink="/tasks/new" class="btn btn-primary mt-3">Add Task</button>
  </div>

  <div class="tasks-grid" *ngIf="!isLoading && tasks.length > 0">
    <div class="task-card glass-card" *ngFor="let task of tasks">
      <div class="task-header">
        <h3 class="task-title" [title]="task.title">{{ task.title }}</h3>
        <span class="badge" [ngClass]="getStatusClass(task.status)">
          {{ getStatusText(task.status) }}
        </span>
      </div>
      <p class="task-desc">{{ task.description }}</p>
      
      <div class="task-meta">
        <div class="meta-item">
          <span class="meta-label">Due:</span> {{ task.due_date | date:'mediumDate' }}
        </div>
      </div>
      
      <div class="task-actions">
        <button class="btn btn-icon btn-secondary" [routerLink]="['/tasks/edit', task.id]" title="Edit">
          Edit
        </button>
        <button class="btn btn-icon btn-danger" (click)="openDeleteDialog(task)" title="Delete">
          Delete
        </button>
      </div>
    </div>
  </div>

  <div class="pagination" *ngIf="!isLoading && totalPages > 1">
    <button class="btn btn-secondary btn-sm" (click)="changePage(currentPage - 1)" [disabled]="currentPage === 1">Previous</button>
    <span class="page-info">Page {{ currentPage }} of {{ totalPages }}</span>
    <button class="btn btn-secondary btn-sm" (click)="changePage(currentPage + 1)" [disabled]="currentPage === totalPages">Next</button>
  </div>
</div>

<app-task-delete-dialog 
  [isOpen]="deleteDialogVisible" 
  [taskTitle]="taskToDelete?.title || ''"
  (confirm)="confirmDelete()" 
  (cancel)="closeDeleteDialog()">
</app-task-delete-dialog>
