<div class="page-container">
  <div class="form-wrapper">
    <div class="form-header">
      <h1 class="page-title">{{ isEditMode ? 'Edit Task' : 'Create New Task' }}</h1>
      <p class="page-subtitle">{{ isEditMode ? 'Update your task details below' : 'Fill in the details to add a new task' }}</p>
    </div>

    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>

    <div *ngIf="isLoading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading task data...</p>
    </div>

    <div class="glass-card p-4" *ngIf="!isLoading">
      <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="title">Title</label>
          <input 
            type="text" 
            id="title" 
            formControlName="title" 
            class="form-control"
            [ngClass]="{'is-invalid': taskForm.get('title')?.invalid && taskForm.get('title')?.touched}"
            placeholder="Enter task title"
          >
          <div class="error-message" *ngIf="taskForm.get('title')?.hasError('required') && taskForm.get('title')?.touched">
            Title is required
          </div>
          <div class="error-message" *ngIf="taskForm.get('title')?.hasError('minlength') && taskForm.get('title')?.touched">
            Title must be at least 3 characters
          </div>
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea 
            id="description" 
            formControlName="description" 
            class="form-control" 
            rows="4"
            placeholder="Enter task description"
          ></textarea>
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label for="status">Status</label>
              <select 
                id="status" 
                formControlName="status" 
                class="form-control"
                [ngClass]="{'is-invalid': taskForm.get('status')?.invalid && taskForm.get('status')?.touched}"
              >
                <option value="PENDING">Pending</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="COMPLETED">Completed</option>
              </select>
              <div class="error-message" *ngIf="taskForm.get('status')?.hasError('required') && taskForm.get('status')?.touched">
                Status is required
              </div>
            </div>
          </div>
          
          <div class="col-md-6">
            <div class="form-group">
              <label for="due_date">Due Date</label>
              <input 
                type="date" 
                id="due_date" 
                formControlName="due_date" 
                class="form-control"
                [ngClass]="{'is-invalid': taskForm.get('due_date')?.invalid && taskForm.get('due_date')?.touched}"
              >
              <div class="error-message" *ngIf="taskForm.get('due_date')?.hasError('required') && taskForm.get('due_date')?.touched">
                Due date is required
              </div>
            </div>
          </div>
        </div>

        <div class="form-actions mt-4">
          <button type="button" class="btn btn-secondary" routerLink="/tasks">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="taskForm.invalid || isSaving">
            <span *ngIf="isSaving">{{ isEditMode ? 'Updating...' : 'Saving...' }}</span>
            <span *ngIf="!isSaving">{{ isEditMode ? 'Update Task' : 'Create Task' }}</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
